<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=960, height=480, initial-scale=1.0">
<title>Echo Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@200;300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 960px;
    height: 480px;
    overflow: hidden;
    background: #000;
    color: #fff;
    font-family: 'Exo 2', sans-serif;
  }

  .bg {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 12% 50%, rgba(0,60,140,0.65) 0%, transparent 50%),
      radial-gradient(ellipse at 88% 80%, rgba(0,40,100,0.3) 0%, transparent 45%),
      linear-gradient(135deg, #000000 0%, #00091a 60%, #000d24 100%);
    z-index: 0;
  }
  .bg::after {
    content:''; position:absolute; inset:0;
    background-image: linear-gradient(rgba(0,100,220,0.035) 1px,transparent 1px), linear-gradient(90deg,rgba(0,100,220,0.035) 1px,transparent 1px);
    background-size: 40px 40px;
  }

  .scanline {
    position:fixed; left:0; width:960px; height:2px;
    background:linear-gradient(90deg,transparent,rgba(0,150,255,0.2),transparent);
    animation:scan 6s linear infinite; z-index:1;
  }
  @keyframes scan{0%{top:-2px}100%{top:482px}}

  .c{position:fixed;width:14px;height:14px;z-index:5;}
  .c.tl{top:6px;left:6px;border-top:1px solid rgba(0,150,255,0.5);border-left:1px solid rgba(0,150,255,0.5)}
  .c.tr{top:6px;right:6px;border-top:1px solid rgba(0,150,255,0.5);border-right:1px solid rgba(0,150,255,0.5)}
  .c.bl{bottom:6px;left:6px;border-bottom:1px solid rgba(0,150,255,0.5);border-left:1px solid rgba(0,150,255,0.5)}
  .c.br{bottom:6px;right:6px;border-bottom:1px solid rgba(0,150,255,0.5);border-right:1px solid rgba(0,150,255,0.5)}

  .layout {
    position:relative; z-index:2;
    width:960px; height:480px;
  }

  /* ═══ LEFT 290px ═══ */
  .left {
    position:absolute; left:0; top:0;
    width:290px; height:480px;
    display:flex; flex-direction:column;
    justify-content:space-between; align-items:center;
    padding:10px 14px;
    border-right:1px solid rgba(0,100,200,0.2);
  }

  .weather-now{width:100%;display:flex;flex-direction:column;align-items:center;margin-top:4px;}
  .weather-row1{display:flex;align-items:center;justify-content:center;gap:8px;}
  .w-icon{font-size:38px;line-height:1;}
  .w-temp{font-family:'Orbitron',monospace;font-size:44px;font-weight:900;color:#fff;text-shadow:0 0 15px rgba(0,150,255,0.6);line-height:1;}
  .w-desc{font-size:11px;font-weight:300;color:#fff;letter-spacing:2px;text-transform:uppercase;margin-top:3px;text-align:center;}

  .forecast{width:100%;display:flex;justify-content:space-around;align-items:flex-start;margin-top:6px;}
  .fc-day{display:flex;flex-direction:column;align-items:center;gap:2px;}
  .fc-name{font-size:11px;font-weight:600;color:#fff;letter-spacing:2px;text-transform:uppercase;}
  .fc-icon{font-size:24px;line-height:1.2;}
  .fc-temp{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:#fff;}

  .clock-section{width:100%;display:flex;flex-direction:column;align-items:center;}
  .time{font-family:'Orbitron',monospace;font-size:78px;font-weight:900;color:#fff;line-height:1;letter-spacing:-3px;text-shadow:0 0 25px rgba(0,150,255,0.9),0 0 60px rgba(0,100,200,0.4);}
  .colon{color:rgba(0,160,255,0.7);animation:blink 1s step-end infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.05}}
  .date-block{text-align:center;margin-top:2px;}
  .date-text{font-size:16px;font-weight:400;color:#fff;letter-spacing:2px;text-transform:uppercase;}
  .day-text{font-size:10px;font-weight:200;color:rgba(255,255,255,0.45);letter-spacing:4px;text-transform:uppercase;margin-top:1px;}

  .prices{width:100%;display:flex;flex-direction:column;gap:6px;margin-bottom:4px;}
  .price-card{background:rgba(0,40,90,0.22);border:1px solid rgba(0,100,200,0.2);padding:6px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;position:relative;}
  .price-card::before{content:'';position:absolute;left:0;top:15%;bottom:15%;width:2px;background:linear-gradient(transparent,rgba(0,150,255,0.7),transparent);}
  .price-left{display:flex;flex-direction:column;align-items:flex-start;gap:1px;}
  .coin-symbol{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:#fff;letter-spacing:3px;}
  .coin-price{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;color:#fff;text-shadow:0 0 12px rgba(0,150,255,0.4);line-height:1;letter-spacing:-1.5px;}
  .coin-change{font-size:14px;font-weight:700;letter-spacing:0.5px;padding:4px 8px;white-space:nowrap;}
  .coin-change.up{color:#00e5a0;background:rgba(0,229,160,0.1);border:1px solid rgba(0,229,160,0.3);}
  .coin-change.down{color:#ff4560;background:rgba(255,69,96,0.1);border:1px solid rgba(255,69,96,0.3);}
  .coin-change.loading{color:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.1);}

  /* ═══ CHARTS 670px — tamanho original v10 ═══ */
  .charts {
    position:absolute; left:290px; top:0;
    width:670px; height:480px;
    display:flex; flex-direction:column;
  }

  .chart-block {
    width:670px; height:240px;
    position:relative; flex-shrink:0;
  }
  .chart-block:first-child{border-bottom:1px solid rgba(0,100,200,0.1);}

  .chart-tag{position:absolute;top:7px;left:10px;z-index:10;display:flex;align-items:center;gap:6px;pointer-events:none;}
  .tag-symbol{font-family:'Orbitron',monospace;font-size:9px;font-weight:700;color:rgba(0,150,255,0.35);letter-spacing:3px;}
  .tag-tf{font-size:8px;color:rgba(0,120,200,0.3);letter-spacing:2px;border:1px solid rgba(0,100,200,0.15);padding:1px 4px;font-family:'Orbitron',monospace;}

  iframe{width:670px;height:240px;border:none;display:block;background:#000;}

  /* ═══ TERMÔMETRO — flutuando POR CIMA da escala do TradingView ═══ */
  /* Posicionado no canto direito, cobrindo os ~70px da escala de preços */
  .thermo-panel {
    position: absolute;
    right: 0;               /* cola na borda direita */
    top: 0;
    width: 68px;            /* largura da escala de preços do TV */
    height: 480px;
    z-index: 100;           /* fica na frente do iframe */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 0;
    gap: 5px;
    /* fundo sólido pra cobrir a escala do TV */
    background: linear-gradient(180deg, #000810 0%, #000d1a 100%);
    border-left: 1px solid rgba(0,100,200,0.25);
  }

  .thermo-label-top {
    font-family:'Orbitron',monospace;
    font-size:6px; font-weight:700;
    color:rgba(255,80,60,0.8);
    letter-spacing:0.5px;
    text-align:center; line-height:1.3;
    text-transform:uppercase;
  }

  .thermo-tube {
    width:24px; height:300px;
    border-radius:12px;
    background:rgba(0,15,40,0.8);
    border:1px solid rgba(0,100,200,0.35);
    position:relative; overflow:hidden;
    flex-shrink:0;
  }

  /* marcações */
  .thermo-tube::before {
    content:'';
    position:absolute;
    left:50%; top:0; bottom:0;
    width:1px;
    background:repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 28px,
      rgba(0,100,200,0.2) 28px,
      rgba(0,100,200,0.2) 30px
    );
  }

  .thermo-fill {
    position:absolute; bottom:0; left:0; right:0;
    border-radius:0 0 12px 12px;
    transition: height 2s cubic-bezier(0.4,0,0.2,1);
    background: linear-gradient(
      to top,
      #0055ff 0%,
      #0088ff 15%,
      #00bbff 30%,
      #00ffcc 45%,
      #00ff88 58%,
      #aaff00 68%,
      #ffcc00 78%,
      #ff7700 88%,
      #ff2200 100%
    );
  }

  /* shimmer no topo do líquido */
  .thermo-fill::after {
    content:'';
    position:absolute; top:0; left:0; right:0; height:6px;
    background:rgba(255,255,255,0.3);
    border-radius:3px;
    animation:shimmer 1.8s ease-in-out infinite;
  }
  @keyframes shimmer{
    0%,100%{opacity:0.15;transform:scaleX(0.7);}
    50%{opacity:0.7;transform:scaleX(1);}
  }

  .thermo-bulb {
    width:32px; height:32px; border-radius:50%;
    border:1px solid rgba(0,100,200,0.4);
    flex-shrink:0;
    animation:bulbPulse 2s ease-in-out infinite;
    transition: background 1s ease;
  }
  @keyframes bulbPulse{
    0%,100%{box-shadow:0 0 6px rgba(0,100,255,0.4);}
    50%{box-shadow:0 0 18px rgba(0,150,255,0.9);}
  }

  .thermo-label-bot {
    font-family:'Orbitron',monospace;
    font-size:6px; font-weight:700;
    color:rgba(0,150,255,0.8);
    letter-spacing:0.5px;
    text-align:center; line-height:1.3;
    text-transform:uppercase;
  }

  .thermo-value {
    font-family:'Orbitron',monospace;
    font-size:20px; font-weight:900;
    color:#fff;
    text-shadow:0 0 12px rgba(0,150,255,0.7);
    text-align:center; line-height:1;
  }

  .thermo-class {
    font-family:'Exo 2',sans-serif;
    font-size:7px; font-weight:600;
    color:rgba(255,255,255,0.6);
    letter-spacing:0.5px;
    text-align:center; text-transform:uppercase;
    line-height:1.3; max-width:62px;
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="scanline"></div>
<div class="c tl"></div><div class="c tr"></div>
<div class="c bl"></div><div class="c br"></div>

<div class="layout">

  <!-- LEFT -->
  <div class="left">
    <div style="width:100%;">
      <div class="weather-now">
        <div class="weather-row1">
          <span class="w-icon" id="w-icon">⛅</span>
          <span class="w-temp" id="w-temp">--°</span>
        </div>
        <div class="w-desc" id="w-desc">carregando</div>
      </div>
      <div class="forecast">
        <div class="fc-day"><span class="fc-name" id="fc0-name">---</span><span class="fc-icon" id="fc0-icon">⛅</span><span class="fc-temp" id="fc0-temp">--°</span></div>
        <div class="fc-day"><span class="fc-name" id="fc1-name">---</span><span class="fc-icon" id="fc1-icon">⛅</span><span class="fc-temp" id="fc1-temp">--°</span></div>
        <div class="fc-day"><span class="fc-name" id="fc2-name">---</span><span class="fc-icon" id="fc2-icon">⛅</span><span class="fc-temp" id="fc2-temp">--°</span></div>
      </div>
    </div>

    <div class="clock-section">
      <div class="time"><span id="h">00</span><span class="colon">:</span><span id="m">00</span></div>
      <div class="date-block">
        <div class="date-text" id="date">01 JAN 2026</div>
        <div class="day-text" id="day">SEGUNDA</div>
      </div>
    </div>

    <div class="prices">
      <div class="price-card">
        <div class="price-left">
          <span class="coin-symbol">BTC</span>
          <span class="coin-price" id="btc-p">---</span>
        </div>
        <span class="coin-change loading" id="btc-c">--</span>
      </div>
      <div class="price-card">
        <div class="price-left">
          <span class="coin-symbol">ETH</span>
          <span class="coin-price" id="eth-p">---</span>
        </div>
        <span class="coin-change loading" id="eth-c">--</span>
      </div>
    </div>
  </div>

  <!-- CHARTS: 670px igual v10 -->
  <div class="charts">
    <div class="chart-block">
      <div class="chart-tag"><span class="tag-symbol">BTCUSDT</span><span class="tag-tf">1H</span></div>
      <iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=60&theme=dark&style=1&hide_side_toolbar=1&hide_top_toolbar=1&save_image=0&calendar=0&news=0" allowtransparency="true"></iframe>
    </div>
    <div class="chart-block">
      <div class="chart-tag"><span class="tag-symbol">ETHUSDT</span><span class="tag-tf">1H</span></div>
      <iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:ETHUSDT&interval=60&theme=dark&style=1&hide_side_toolbar=1&hide_top_toolbar=1&save_image=0&calendar=0&news=0" allowtransparency="true"></iframe>
    </div>
  </div>

  <!-- TERMÔMETRO: z-index:100, flutuando sobre a escala do TradingView -->
  <div class="thermo-panel">
    <div class="thermo-label-top">GANÂNCIA<br>EXTREMA</div>
    <div class="thermo-tube">
      <div class="thermo-fill" id="thermo-fill" style="height:50%;"></div>
    </div>
    <div class="thermo-bulb" id="thermo-bulb" style="background:radial-gradient(circle at 40% 35%,rgba(255,255,255,0.3),#0044aa);"></div>
    <div class="thermo-label-bot">MEDO<br>EXTREMO</div>
    <div class="thermo-value" id="fg-value">--</div>
    <div class="thermo-class" id="fg-class">...</div>
  </div>

</div>

<script>
  const DAYS=['DOM','SEG','TER','QUA','QUI','SEX','SÁB'];
  const DAYS_FULL=['DOMINGO','SEGUNDA','TERÇA','QUARTA','QUINTA','SEXTA','SÁBADO'];
  const MONTHS=['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];

  function updateClock(){
    const n=new Date();
    document.getElementById('h').textContent=String(n.getHours()).padStart(2,'0');
    document.getElementById('m').textContent=String(n.getMinutes()).padStart(2,'0');
    document.getElementById('date').textContent=String(n.getDate()).padStart(2,'0')+' '+MONTHS[n.getMonth()]+' '+n.getFullYear();
    document.getElementById('day').textContent=DAYS_FULL[n.getDay()];
  }

  async function fetchPrices(){
    try{
      const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd&include_24hr_change=true',{mode:'cors'});
      const d=await r.json();
      const btcP=d.bitcoin.usd,btcC=d.bitcoin.usd_24h_change;
      const ethP=d.ethereum.usd,ethC=d.ethereum.usd_24h_change;
      document.getElementById('btc-p').textContent='$'+Math.round(btcP).toLocaleString('en-US');
      const bc=document.getElementById('btc-c');
      bc.textContent=(btcC>=0?'+':'')+btcC.toFixed(2)+'%';
      bc.className='coin-change '+(btcC>=0?'up':'down');
      document.getElementById('eth-p').textContent='$'+Math.round(ethP).toLocaleString('en-US');
      const ec=document.getElementById('eth-c');
      ec.textContent=(ethC>=0?'+':'')+ethC.toFixed(2)+'%';
      ec.className='coin-change '+(ethC>=0?'up':'down');
    }catch(e){}
  }

  async function fetchFearGreed(){
    try{
      const r=await fetch('https://api.alternative.me/fng/?limit=1',{mode:'cors'});
      const d=await r.json();
      const value=parseInt(d.data[0].value);
      const cls=d.data[0].value_classification;
      document.getElementById('fg-value').textContent=value;
      const labels={'Extreme Fear':'MEDO EXTREMO','Fear':'MEDO','Neutral':'NEUTRO','Greed':'GANÂNCIA','Extreme Greed':'GANÂNCIA EXT.'};
      document.getElementById('fg-class').textContent=labels[cls]||cls;
      document.getElementById('thermo-fill').style.height=value+'%';
      const bulb=document.getElementById('thermo-bulb');
      if(value<=20){bulb.style.background='radial-gradient(circle at 40% 35%,rgba(255,255,255,0.3),#0033cc)';bulb.style.boxShadow='0 0 14px rgba(0,80,255,0.9)';}
      else if(value<=40){bulb.style.background='radial-gradient(circle at 40% 35%,rgba(255,255,255,0.3),#0088cc)';bulb.style.boxShadow='0 0 14px rgba(0,150,200,0.9)';}
      else if(value<=60){bulb.style.background='radial-gradient(circle at 40% 35%,rgba(255,255,255,0.3),#00aa88)';bulb.style.boxShadow='0 0 14px rgba(0,200,150,0.9)';}
      else if(value<=80){bulb.style.background='radial-gradient(circle at 40% 35%,rgba(255,255,255,0.3),#cc6600)';bulb.style.boxShadow='0 0 14px rgba(255,140,0,0.9)';}
      else{bulb.style.background='radial-gradient(circle at 40% 35%,rgba(255,255,255,0.3),#cc1100)';bulb.style.boxShadow='0 0 14px rgba(255,30,0,0.9)';}
    }catch(e){
      document.getElementById('fg-value').textContent='--';
      document.getElementById('fg-class').textContent='OFFLINE';
    }
  }

  function wIcon(c){
    if(c===0)return'☀️';if(c<=2)return'⛅';if(c<=3)return'☁️';
    if(c<=48)return'🌫️';if(c<=57)return'🌦️';if(c<=67)return'🌧️';
    if(c<=82)return'🌧️';if(c<=99)return'⛈️';return'🌡️';
  }
  function wDesc(c){
    if(c===0)return'CÉU LIMPO';if(c<=2)return'PARC. NUBLADO';
    if(c<=3)return'NUBLADO';if(c<=48)return'NEBLINA';
    if(c<=57)return'GAROA';if(c<=67)return'CHUVA';
    if(c<=82)return'CHUVA FORTE';if(c<=99)return'TEMPESTADE';
    return'VARIÁVEL';
  }

  async function fetchWeather(){
    try{
      const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=-2.53&longitude=-44.30&current=temperature_2m,weathercode&daily=weathercode,temperature_2m_max&timezone=America%2FFortaleza&forecast_days=4',{mode:'cors'});
      const d=await r.json();
      document.getElementById('w-icon').textContent=wIcon(d.current.weathercode);
      document.getElementById('w-temp').textContent=Math.round(d.current.temperature_2m)+'°';
      document.getElementById('w-desc').textContent=wDesc(d.current.weathercode);
      for(let i=0;i<3;i++){
        const idx=i+1;
        const dd=new Date(d.daily.time[idx]+'T12:00:00');
        document.getElementById('fc'+i+'-name').textContent=DAYS[dd.getDay()];
        document.getElementById('fc'+i+'-icon').textContent=wIcon(d.daily.weathercode[idx]);
        document.getElementById('fc'+i+'-temp').textContent=Math.round(d.daily.temperature_2m_max[idx])+'°';
      }
    }catch(e){}
  }

  updateClock(); fetchPrices(); fetchWeather(); fetchFearGreed();
  setInterval(updateClock,1000);
  setInterval(fetchPrices,60000);
  setInterval(fetchWeather,600000);
  setInterval(fetchFearGreed,300000);
</script>
</body>
</html>
