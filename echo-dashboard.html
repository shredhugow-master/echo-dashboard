<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=960, height=480, initial-scale=1.0">
<title>Echo Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@200;300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 960px;
    height: 480px;
    overflow: hidden;
    background: #000;
    color: #fff;
    font-family: 'Exo 2', sans-serif;
  }

  .bg {
    position: fixed;
    top: 0; left: 0;
    width: 960px; height: 480px;
    background:
      radial-gradient(ellipse at 15% 50%, rgba(0,60,140,0.7) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 20%, rgba(0,80,160,0.25) 0%, transparent 45%),
      linear-gradient(135deg, #000000 0%, #00091a 60%, #000d24 100%);
    z-index: 0;
  }

  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,100,220,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,100,220,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .scanline {
    position: fixed;
    left: 0; width: 960px; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0,150,255,0.25), transparent);
    animation: scan 5s linear infinite;
    z-index: 1;
  }

  @keyframes scan {
    0% { top: -2px; }
    100% { top: 482px; }
  }

  /* LAYOUT */
  .layout {
    position: relative;
    z-index: 2;
    width: 960px;
    height: 480px;
    display: flex;
  }

  /* LEFT */
  .left {
    width: 260px;
    height: 480px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 16px 20px;
    border-right: 1px solid rgba(0,100,200,0.2);
  }

  /* CLOCK */
  .time {
    font-family: 'Orbitron', monospace;
    font-size: 76px;
    font-weight: 900;
    color: #ffffff;
    line-height: 1;
    letter-spacing: -3px;
    text-shadow:
      0 0 20px rgba(0,150,255,0.9),
      0 0 50px rgba(0,100,200,0.5);
  }

  .colon {
    color: rgba(0,160,255,0.7);
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.05; }
  }

  /* DATE */
  .date-block {
    margin-top: 10px;
    text-align: center;
  }

  .date-text {
    font-size: 18px;
    font-weight: 400;
    color: #ffffff;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .day-text {
    font-size: 12px;
    font-weight: 200;
    color: rgba(255,255,255,0.45);
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,150,255,0.35), transparent);
    margin: 16px 0;
  }

  /* PRICES */
  .prices {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .price-card {
    background: rgba(0,40,90,0.25);
    border: 1px solid rgba(0,100,200,0.2);
    padding: 10px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
  }

  .price-card::before {
    content: '';
    position: absolute;
    left: 0; top: 15%; bottom: 15%;
    width: 2px;
    background: linear-gradient(transparent, rgba(0,150,255,0.7), transparent);
  }

  .coin-left { display: flex; flex-direction: column; gap: 2px; }

  .coin-symbol {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    font-weight: 700;
    color: rgba(0,160,255,0.55);
    letter-spacing: 3px;
  }

  .coin-price {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 700;
    color: #ffffff;
    text-shadow: 0 0 12px rgba(0,150,255,0.35);
  }

  .coin-change {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 1px;
    padding: 3px 7px;
  }

  .coin-change.up {
    color: #00e5a0;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.25);
  }

  .coin-change.down {
    color: #ff4560;
    background: rgba(255,69,96,0.1);
    border: 1px solid rgba(255,69,96,0.25);
  }

  .coin-change.loading {
    color: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.1);
  }

  /* RIGHT - CHARTS */
  .right {
    width: 700px;
    height: 480px;
    display: flex;
    flex-direction: column;
  }

  .chart-block {
    width: 700px;
    height: 240px;
    position: relative;
    overflow: hidden;
  }

  .chart-block:first-child {
    border-bottom: 1px solid rgba(0,100,200,0.12);
  }

  .chart-tag {
    position: absolute;
    top: 7px;
    left: 10px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 6px;
    pointer-events: none;
  }

  .tag-symbol {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    font-weight: 700;
    color: rgba(0,150,255,0.35);
    letter-spacing: 3px;
  }

  .tag-tf {
    font-size: 8px;
    color: rgba(0,120,200,0.3);
    letter-spacing: 2px;
    border: 1px solid rgba(0,100,200,0.18);
    padding: 1px 4px;
    font-family: 'Orbitron', monospace;
  }

  iframe {
    width: 700px;
    height: 240px;
    border: none;
    display: block;
    background: #000;
  }

  /* CORNERS */
  .c { position: fixed; width: 14px; height: 14px; z-index: 5; }
  .c.tl { top:8px; left:8px; border-top:1px solid rgba(0,150,255,0.5); border-left:1px solid rgba(0,150,255,0.5); }
  .c.tr { top:8px; right:8px; border-top:1px solid rgba(0,150,255,0.5); border-right:1px solid rgba(0,150,255,0.5); }
  .c.bl { bottom:8px; left:8px; border-bottom:1px solid rgba(0,150,255,0.5); border-left:1px solid rgba(0,150,255,0.5); }
  .c.br { bottom:8px; right:8px; border-bottom:1px solid rgba(0,150,255,0.5); border-right:1px solid rgba(0,150,255,0.5); }

  .dot {
    position: fixed;
    bottom: 11px; left: 130px;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(0,150,255,0.5);
    animation: pulse 2.5s ease-in-out infinite;
    z-index: 5;
  }

  @keyframes pulse {
    0%,100% { opacity: 0.2; }
    50% { opacity: 1; box-shadow: 0 0 8px rgba(0,150,255,0.8); }
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="scanline"></div>
<div class="c tl"></div>
<div class="c tr"></div>
<div class="c bl"></div>
<div class="c br"></div>
<div class="dot"></div>

<div class="layout">

  <!-- LEFT -->
  <div class="left">
    <div class="time">
      <span id="h">00</span><span class="colon">:</span><span id="m">00</span>
    </div>
    <div class="date-block">
      <div class="date-text" id="date">01 JAN 2026</div>
      <div class="day-text" id="day">SEGUNDA</div>
    </div>
    <div class="divider"></div>
    <div class="prices">
      <div class="price-card">
        <div class="coin-left">
          <span class="coin-symbol">BTC</span>
          <span class="coin-price" id="btc-p">---</span>
        </div>
        <span class="coin-change loading" id="btc-c">--</span>
      </div>
      <div class="price-card">
        <div class="coin-left">
          <span class="coin-symbol">ETH</span>
          <span class="coin-price" id="eth-p">---</span>
        </div>
        <span class="coin-change loading" id="eth-c">--</span>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="chart-block">
      <div class="chart-tag">
        <span class="tag-symbol">BTCUSDT</span>
        <span class="tag-tf">1H</span>
      </div>
      <iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=60&theme=dark&style=1&hide_side_toolbar=1&hide_top_toolbar=1&save_image=0&calendar=0&news=0" allowtransparency="true"></iframe>
    </div>
    <div class="chart-block">
      <div class="chart-tag">
        <span class="tag-symbol">ETHUSDT</span>
        <span class="tag-tf">1H</span>
      </div>
      <iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:ETHUSDT&interval=60&theme=dark&style=1&hide_side_toolbar=1&hide_top_toolbar=1&save_image=0&calendar=0&news=0" allowtransparency="true"></iframe>
    </div>
  </div>

</div>

<script>
  const DAYS = ['DOMINGO','SEGUNDA','TERÇA','QUARTA','QUINTA','SEXTA','SÁBADO'];
  const MONTHS = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];

  function updateClock() {
    const n = new Date();
    document.getElementById('h').textContent = String(n.getHours()).padStart(2,'0');
    document.getElementById('m').textContent = String(n.getMinutes()).padStart(2,'0');
    document.getElementById('date').textContent =
      String(n.getDate()).padStart(2,'0') + ' ' + MONTHS[n.getMonth()] + ' ' + n.getFullYear();
    document.getElementById('day').textContent = DAYS[n.getDay()];
  }

  async function fetchPrices() {
    try {
      const r = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbols=%5B%22BTCUSDT%22,%22ETHUSDT%22%5D');
      const data = await r.json();
      data.forEach(t => {
        const price = parseFloat(t.lastPrice);
        const change = parseFloat(t.priceChangePercent);
        const isUp = change >= 0;
        const pTxt = price >= 1000
          ? '$' + Math.round(price).toLocaleString('en-US')
          : '$' + price.toFixed(2);
        const cTxt = (isUp ? '+' : '') + change.toFixed(2) + '%';
        const cls = 'coin-change ' + (isUp ? 'up' : 'down');
        if (t.symbol === 'BTCUSDT') {
          document.getElementById('btc-p').textContent = pTxt;
          const el = document.getElementById('btc-c');
          el.textContent = cTxt; el.className = cls;
        } else if (t.symbol === 'ETHUSDT') {
          document.getElementById('eth-p').textContent = pTxt;
          const el = document.getElementById('eth-c');
          el.textContent = cTxt; el.className = cls;
        }
      });
    } catch(e) {
      console.log('fetch error', e);
    }
  }

  updateClock();
  fetchPrices();
  setInterval(updateClock, 1000);
  setInterval(fetchPrices, 30000);
</script>
</body>
</html>
